services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: ha-tapelectric-test
    restart: unless-stopped
    ports:
      - "8123:8123"
    environment:
      - TZ=Europe/Amsterdam
    volumes:
      - ./ha-config:/config
      - ../custom_components/tapelectric:/config/custom_components/tapelectric:ro

  mock-api:
    image: python:3.12-alpine
    container_name: tap-electric-mock-api
    profiles:
      - mock
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - MOCK_API_KEY=tap-test-key
      - TZ=Europe/Amsterdam
    working_dir: /app
    command: python /app/mock_api.py
    volumes:
      - ./mock-api:/app:ro
